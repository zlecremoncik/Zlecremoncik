<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZlećRemoncik - Fachowcy i Zlecenia</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.7/dist/umd/supabase.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-image: linear-gradient(rgba(248, 250, 252, 0.60), rgba(248, 250, 252, 0.60)), url('kuchnia.png');
            background-attachment: fixed;
            background-size: cover;
            background-position: center;
        }
        .card-shadow { box-shadow: 0 15px 30px -5px rgba(0, 0, 0, 0.08); }
        .hidden { display: none !important; }
        .loader { border: 3px solid #f3f3f3; border-top: 3px solid #3b82f6; border-radius: 50%; width: 20px; height: 20px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="text-slate-900">

<nav class="bg-white sticky top-0 z-50 border-b border-slate-200 shadow-sm">
    <div class="max-w-5xl mx-auto px-4 py-3 flex justify-between items-center">
        <div onclick="goBackToList()" class="text-2xl font-extrabold tracking-tighter text-slate-800 cursor-pointer">Zleć<span class="text-blue-600">Remoncik</span></div>
        <div class="flex items-center gap-3">
            <span id="points-counter" class="hidden text-[10px] font-black text-amber-600 bg-amber-50 px-3 py-1 rounded-full uppercase">Posiadasz: 0 pkt</span>
            <button id="my-account-btn" onclick="setView('konto')" class="hidden text-[10px] font-bold text-blue-600 bg-blue-50 px-3 py-1 rounded-full uppercase">Moje Konto</button>
            <span id="user-info" class="text-[10px] font-bold text-slate-400 bg-slate-50 px-3 py-1 rounded-full uppercase"></span>
            <button id="logout-btn" onclick="signOut()" class="hidden text-[10px] font-bold text-red-400 hover:text-red-600 uppercase">Wyloguj</button>
        </div>
    </div>
</nav>

<main class="max-w-3xl mx-auto px-4 mt-10 relative z-20">
    <!-- Panel Autoryzacji i Rejestracji -->
    <div id="auth-panel" class="bg-white p-8 rounded-3xl card-shadow mb-8 border border-slate-100">
        <div class="space-y-4">
            <div class="p-1 bg-slate-100 rounded-2xl flex gap-1 mb-2">
                <button id="auth-role-klient" onclick="setAuthRole('klient')" class="flex-1 py-3 rounded-xl text-[10px] font-black bg-white shadow-sm uppercase">Chcę zlecać / oceniać</button>
                <button id="auth-role-wykonawca" onclick="setAuthRole('wykonawca')" class="flex-1 py-3 rounded-xl text-[10px] font-black text-slate-500 uppercase">Jestem Wykonawcą</button>
            </div>

            <input id="email" type="email" placeholder="E-mail" class="w-full bg-slate-50 border-2 p-4 rounded-2xl outline-none focus:border-blue-400">
            <input id="password" type="password" placeholder="Hasło" class="w-full bg-slate-50 border-2 p-4 rounded-2xl outline-none focus:border-blue-400">
            
            <!-- Dodatkowe pola dla wykonawcy przy rejestracji -->
            <div id="pro-register-fields" class="hidden space-y-4 border-t border-dashed border-slate-200 pt-4">
                <p class="text-xs font-bold text-amber-600 uppercase tracking-wider">📋 Profil wykonawcy (Wymagany do rejestracji):</p>
                <input id="reg-firma" placeholder="Nazwa firmy" class="w-full bg-slate-50 border-2 p-3 rounded-xl outline-none focus:border-blue-400">
                <input id="reg-nip" placeholder="NIP (Opcjonalnie)" class="w-full bg-slate-50 border-2 p-3 rounded-xl outline-none focus:border-blue-400">
                <div class="grid grid-cols-2 gap-4">
                    <input id="reg-miejscowosc" placeholder="Miejscowość" class="w-full bg-slate-50 border-2 p-3 rounded-xl outline-none focus:border-blue-400">
                    <input id="reg-kod" placeholder="Kod pocztowy (np. 00-001)" class="w-full bg-slate-50 border-2 p-3 rounded-xl outline-none focus:border-blue-400">
                </div>
                <input id="reg-spec" placeholder="Specjalizacja (np. Hydraulika, Elektryka, Wykończenia)" class="w-full bg-slate-50 border-2 p-3 rounded-xl outline-none focus:border-blue-400">
                <div class="p-3 bg-amber-50 rounded-xl border border-dashed border-amber-200">
                    <label class="block text-[10px] font-black text-amber-700 uppercase mb-1">Portfolio (Dodaj do 7 zdjęć):</label>
                    <input id="reg-portfolio" type="file" accept="image/*" multiple class="text-[10px] w-full">
                </div>
            </div>

            <div class="grid grid-cols-2 gap-4">
                <button onclick="signIn()" class="bg-blue-600 text-white py-4 rounded-2xl font-bold uppercase text-xs">Zaloguj</button>
                <button onclick="signUp()" class="bg-slate-800 text-white py-4 rounded-2xl font-bold uppercase text-xs">Rejestruj konto</button>
            </div>
        </div>
    </div>

    <!-- Panel dodawania ogłoszeń -->
    <div id="add-panel" class="hidden bg-white p-8 rounded-3xl card-shadow mb-12 border-2 border-blue-50">
        <div class="space-y-4">
            <div class="p-1 bg-slate-100 rounded-2xl flex gap-1 mb-4">
                <button id="role-klient" onclick="setRole('klient')" class="flex-1 py-3 rounded-xl text-[10px] font-black bg-white shadow-sm uppercase">Szukam Pomocy</button>
                <button id="role-wykonawca" onclick="setRole('wykonawca')" class="flex-1 py-3 rounded-xl text-[10px] font-black text-slate-500 uppercase">Jestem Fachowcem</button>
            </div>
            
            <input id="t" placeholder="Tytuł ogłoszenia / wizytówki" class="w-full bg-slate-50 border-2 p-3 rounded-xl outline-none focus:border-blue-300">
            <div class="grid grid-cols-2 gap-4">
                <input id="m" placeholder="Miasto" class="w-full bg-slate-50 border-2 p-3 rounded-xl outline-none focus:border-blue-300">
                <select id="k" class="w-full bg-slate-50 border-2 p-3 rounded-xl outline-none font-bold text-sm">
                    <option value="">📁 Wybierz kategorię...</option>
                    <option value="Remonty kompleksowe">Remonty kompleksowe</option>
                    <option value="Wykończenia wnętrz">Wykończenia wnętrz</option>
                    <option value="Remonty łazienek">Remonty łazienek</option>
                    <option value="Elektryka i oświetlenie">Elektryka i oświetlenie</option>
                    <option value="Hydraulika i biały montaż">Hydraulika i biały montaż</option>
                </select>
            </div>
            <textarea id="o" placeholder="Opis..." class="w-full bg-slate-50 border-2 p-3 rounded-xl h-24 outline-none focus:border-blue-300"></textarea>
            <input id="p" type="tel" maxlength="9" placeholder="Telefon (9 cyfr)" class="w-full bg-slate-50 border-2 p-3 rounded-xl outline-none focus:border-blue-300">
            
            <div class="flex items-center gap-4 p-3 bg-slate-50 rounded-xl border-2 border-dashed border-slate-200">
                <input id="img-input" type="file" accept="image/*" class="text-[10px] flex-1">
                <div id="upload-spinner" class="hidden loader"></div>
            </div>

            <button onclick="add()" id="add-btn" class="w-full bg-blue-600 text-white py-5 rounded-2xl font-black text-lg shadow-xl uppercase">Dodaj wpis</button>
        </div>
    </div>

    <!-- Filtry główne -->
    <div id="filter-panel" class="mb-8 space-y-3">
        <div class="flex flex-wrap gap-2 justify-center">
            <button onclick="setView('wszystko')" id="v-all" class="px-6 py-2 bg-blue-600 text-white rounded-full text-[10px] font-black uppercase shadow-md">Wszystko</button>
            <button onclick="setView('klient')" id="v-klient" class="px-6 py-2 bg-white border border-slate-200 rounded-full text-[10px] font-black uppercase">Zlecenia</button>
            <button onclick="setView('wykonawca')" id="v-wykonawca" class="px-6 py-2 bg-white border border-slate-200 rounded-full text-[10px] font-black uppercase">Fachowcy</button>
        </div>
    </div>

    <!-- WIDOK: Szczegóły Ogłoszenia -->
    <div id="details-view" class="hidden mb-12">
        <button onclick="goBackToList()" class="mb-4 px-4 py-2 bg-slate-200 text-slate-700 rounded-xl font-bold text-xs uppercase hover:bg-slate-300">⬅ Powrót</button>
        <div id="details-content"></div>
        
        <!-- Sekcja Opinii pod Fachowcem -->
        <div id="opinions-section" class="hidden mt-8 bg-white p-6 rounded-3xl card-shadow border border-slate-100">
            <h3 class="text-lg font-black mb-4">⭐ Opinie o wykonawcy</h3>
            <div id="opinions-list" class="space-y-4 mb-6"></div>
            
            <!-- Formularz dodawania opinii -->
            <div class="border-t border-dashed border-slate-200 pt-4 space-y-3">
                <p class="text-xs font-bold text-slate-400 uppercase">Dodaj opinię (Wymaga podania adresu e-mail powiązanego z Twoim ogłoszeniem):</p>
                <input id="op-email" type="email" placeholder="Twój e-mail weryfikacyjny" class="w-full bg-slate-50 border-2 p-3 rounded-xl text-sm outline-none">
                <select id="op-stars" class="w-full bg-slate-50 border-2 p-3 rounded-xl font-bold text-sm outline-none">
                    <option value="5">⭐⭐⭐⭐⭐ 5 Gwiazdek</option>
                    <option value="4">⭐⭐⭐⭐ 4 Gwiazdki</option>
                    <option value="3">⭐⭐⭐ 3 Gwiazdki</option>
                    <option value="2">⭐⭐ 2 Gwiazdki</option>
                    <option value="1">⭐ 1 Gwiazdka</option>
                </select>
                <textarea id="op-text" placeholder="Treść opinii..." class="w-full bg-slate-50 border-2 p-3 rounded-xl h-20 text-sm outline-none"></textarea>
                <input id="op-files" type="file" accept="image/*" multiple class="text-[10px] w-full">
                <button onclick="submitOpinion()" class="w-full bg-slate-800 text-white py-3 rounded-xl text-xs font-bold uppercase">Wyślij opinię</button>
            </div>
        </div>
    </div>

    <!-- WIDOK: Panel Moje Konto -->
    <div id="account-view" class="hidden mb-12 space-y-6">
        <button onclick="goBackToList()" class="px-4 py-2 bg-slate-200 text-slate-700 rounded-xl font-bold text-xs uppercase">⬅ Powrót do tablicy</button>
        <div class="bg-white p-6 rounded-3xl card-shadow border border-slate-100">
            <h2 class="text-2xl font-black mb-4 text-blue-600">🎛️ Panel Moje Konto</h2>
            
            <div class="border-b border-slate-100 pb-4 mb-6">
                <h3 class="text-sm font-black text-slate-400 uppercase tracking-wider mb-3">Twoje Wpisy / Ogłoszenia</h3>
                <div id="user-posts-list" class="space-y-3"></div>
            </div>

            <div>
                <h3 class="text-sm font-black text-slate-400 uppercase tracking-wider mb-3">💬 Twoje Konwersacje (Wiadomości)</h3>
                <div id="user-chats-list" class="space-y-2"></div>
                <div id="chat-box" class="hidden mt-4 p-4 border border-slate-200 rounded-2xl bg-slate-50 space-y-3">
                    <div id="chat-messages" class="h-48 overflow-y-auto space-y-2 p-2 bg-white rounded-xl border border-slate-100 text-sm"></div>
                    <div class="flex gap-2">
                        <input id="chat-input" placeholder="Wpisz wiadomość..." class="flex-1 border p-2 rounded-xl text-sm outline-none">
                        <button onclick="sendMessage()" class="bg-blue-600 text-white px-4 py-2 rounded-xl font-bold text-xs uppercase">Wyślij</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Lista Główna Tablicy -->
    <div id="list" class="space-y-6 pb-20"></div>
</main>

<script>
const SUPABASE_URL = "https://uodwrtpaesemcizdhcht.supabase.co";
const SUPABASE_KEY = "sb_publishable_WVkoJLfkTfUD95EeSZMDQQ_VEhzlW6n";

const db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY, {
    auth: { persistSession: true, autoRefreshToken: true }
});

let currentUser = null;
let currentProfile = null;
let selectedRole = 'klient';
let authRole = 'klient';
let currentView = 'wszystko';
let activeTargetId = null; 
let activeZlecenieId = null;

async function checkUser() {
    const { data: { session } } = await db.auth.getSession();
    updateUI(session);
}

async function updateUI(session) {
    currentUser = session?.user || null;
    document.getElementById('auth-panel').classList.toggle('hidden', !!session);
    document.getElementById('logout-btn').classList.toggle('hidden', !session);
    document.getElementById('my-account-btn').classList.toggle('hidden', !session);
    document.getElementById('user-info').innerText = session ? session.user.email : "";

    if (currentUser) {
        const { data } = await db.from('profile_wykonawcow').select('*').eq('user_id', currentUser.id).single();
        currentProfile = data || null;
        if (currentProfile) {
            const pCounter = document.getElementById('points-counter');
            pCounter.innerText = `Posiadasz: ${currentProfile.punkty} pkt`;
            pCounter.classList.remove('hidden');
        } else {
            document.getElementById('points-counter').classList.add('hidden');
        }
        document.getElementById('add-panel').classList.toggle('hidden', currentView === 'konto');
    } else {
        document.getElementById('points-counter').classList.add('hidden');
        document.getElementById('add-panel').classList.add('hidden');
    }

    if (currentView === 'konto') {
        loadAccountPanel();
    } else {
        load();
    }
}

db.auth.onAuthStateChange((event, session) => { updateUI(session); });
checkUser();
window.addEventListener('hashchange', checkUrlRoute);

function setAuthRole(role) {
    authRole = role;
    document.getElementById('auth-role-klient').className = role === 'klient' ? 'flex-1 py-3 rounded-xl text-[10px] font-black bg-white shadow-sm uppercase' : 'flex-1 py-3 rounded-xl text-[10px] font-black text-slate-500 uppercase';
    document.getElementById('auth-role-wykonawca').className = role === 'wykonawca' ? 'flex-1 py-3 rounded-xl text-[10px] font-black bg-white shadow-sm uppercase' : 'flex-1 py-3 rounded-xl text-[10px] font-black text-slate-500 uppercase';
    document.getElementById('pro-register-fields').classList.toggle('hidden', role !== 'wykonawca');
}

function setRole(role) {
    selectedRole = role;
    document.getElementById('role-klient').className = role === 'klient' ? 'flex-1 py-3 rounded-xl text-[10px] font-black bg-white shadow-sm uppercase' : 'flex-1 py-3 rounded-xl text-[10px] font-black text-slate-500 uppercase';
    document.getElementById('role-wykonawca').className = role === 'wykonawca' ? 'flex-1 py-3 rounded-xl text-[10px] font-black bg-white shadow-sm uppercase' : 'flex-1 py-3 rounded-xl text-[10px] font-black text-slate-500 uppercase';
}

function setView(view) {
    currentView = view;
    document.getElementById('account-view').classList.toggle('hidden', view !== 'konto');
    document.getElementById('list').classList.toggle('hidden', view === 'konto');
    document.getElementById('filter-panel').classList.toggle('hidden', view === 'konto');
    document.getElementById('details-view').classList.add('hidden');
    updateUI(currentUser ? { user: currentUser } : null);
}

async function signIn() {
    const e = document.getElementById('email').value;
    const p = document.getElementById('password').value;
    if(!e || !p) return alert("Wpisz e-mail i hasło!");
    const { error } = await db.auth.signInWithPassword({ email: e, password: p });
    if (error) alert(error.message);
}

async function signUp() {
    const e = document.getElementById('email').value;
    const p = document.getElementById('password').value;
    if(!e || !p) return alert("Wpisz dane logowania!");

    const { data, error } = await db.auth.signUp({ email: e, password: p });
    if (error) return alert(error.message);

    if (authRole === 'wykonawca' && data.user) {
        let uploadedUrls = [];
        const files = document.getElementById('reg-portfolio').files;
        for(let i=0; i<Math.min(files.length, 7); i++) {
            const fName = `${Date.now()}_port_${i}.${files[i].name.split('.').pop()}`;
            await db.storage.from('zdjecia').upload(fName, files[i]);
            uploadedUrls.push(db.storage.from('zdjacie').getPublicUrl(fName).data.publicUrl || db.storage.from('zdjecia').getPublicUrl(fName).data.publicUrl);
        }

        await db.from('profile_wykonawcow').insert([{
            user_id: data.user.id,
            nazwa_firmy: document.getElementById('reg-firma').value || "Brak Nazwy",
            nip: document.getElementById('reg-nip').value || null,
            miejscowosc: document.getElementById('reg-miejscowosc').value || "Brak",
            kod_pocztowy: document.getElementById('reg-kod').value || "00-000",
            specjalizacja: document.getElementById('reg-spec').value || "Ogólne",
            galeria_urls: uploadedUrls,
            punkty: 10
        }]);
    }
    alert("Konto zarejestrowane! Zaloguj się.");
}

async function signOut() { await db.auth.signOut(); window.location.hash = ""; setView('wszystko'); }

async function add() {
    const tVal = document.getElementById("t").value;
    const pVal = document.getElementById("p").value;
    const mVal = document.getElementById("m").value;
    const kVal = document.getElementById("k").value;
    const oVal = document.getElementById("o").value;

    if (!tVal || pVal.length !== 9) return alert("Podaj tytuł i 9 cyfr telefonu!");

    const btn = document.getElementById('add-btn');
    btn.disabled = true; btn.innerText = "Publikowanie...";

    try {
        const file = document.getElementById('img-input').files[0];
        let photoUrl = "";
        if (file) {
            const fileName = `${Date.now()}_img.${file.name.split('.').pop()}`;
            await db.storage.from('zdjecia').upload(fileName, file);
            photoUrl = db.storage.from('zdjecia').getPublicUrl(fileName).data.publicUrl;
        }

        await db.from("zlecenia").insert([{
            tytul: tVal, miasto: mVal, opis: oVal, telefon: pVal, kategoria: kVal,
            zdjecie_url: photoUrl, user_id: currentUser.id, typ_wpisu: selectedRole
        }]);

        alert("Dodano!");
        load();
    } catch (err) { alert(err.message); }
    finally { btn.disabled = false; btn.innerText = "Dodaj wpis"; }
}

async function load() {
    let q = db.from("zlecenia").select("*").order("id", { ascending: false });
    if (currentView !== 'wszystko') q = q.eq('typ_wpisu', currentView);
    const { data } = await q;

    const listEl = document.getElementById("list");
    if (!data || data.length === 0) { listEl.innerHTML = `<p class="text-center text-slate-400 py-10">Brak wpisów.</p>`; return; }

    listEl.innerHTML = data.map(z => `
        <div onclick="openDetails(${z.id})" class="bg-white rounded-[2rem] card-shadow overflow-hidden border border-slate-100 cursor-pointer p-6">
            <div class="flex justify-between text-[9px] font-black uppercase mb-2">
                <span class="text-blue-600">${z.typ_wpisu === 'wykonawca' ? '⭐ Fachowiec' : '📝 Zlecenie'}</span>
                <span>📍 ${z.miasto}</span>
            </div>
            <h3 class="text-xl font-black">${z.tytul}</h3>
            <p class="text-slate-500 text-sm mt-1 line-clamp-2">${z.opis}</p>
        </div>
    `).join("");
}

function openDetails(id) { window.location.hash = `ogloszenie-${id}`; }
function goBackToList() { window.location.hash = ""; setView('wszystko'); }

async function checkUrlRoute() {
    const hash = window.location.hash;
    if (!hash.startsWith('#ogloszenie-')) return;
    const id = hash.replace('#ogloszenie-', '');

    document.getElementById('list').classList.add('hidden');
    document.getElementById('add-panel').classList.add('hidden');
    document.getElementById('filter-panel').classList.add('hidden');
    const detailsView = document.getElementById('details-view');
    detailsView.classList.remove('hidden');

    const { data: z } = await db.from("zlecenia").select("*").eq('id', id).single();
    if (!z) return;

    const { data: countData } = await db.from('zgloszenia').select('id', { count: 'exact' }).eq('zlecenie_id', id);
    const totalApplicants = countData ? countData.length : 0;

    let actionBtn = "";
    if (currentUser && z.typ_wpisu === 'klient' && z.user_id !== currentUser.id) {
        if (totalApplicants >= 5) {
            actionBtn = `<button disabled class="w-full bg-slate-300 text-white py-3 rounded-xl font-bold uppercase text-xs">Zebrano już komplet chętnych</button>`;
        } else {
            actionBtn = `<button onclick="applyForJob(${z.id})" class="w-full bg-amber-500 text-white py-3 rounded-xl font-bold uppercase text-xs">🙋 Jestem Zainteresowany (-1 pkt)</button>`;
        }
    }

    document.getElementById('details-content').innerHTML = `
        <div class="bg-white p-6 rounded-3xl card-shadow border border-slate-100 space-y-4">
            <h1 class="text-2xl font-black">${z.tytul}</h1>
            <p class="text-sm text-slate-600 leading-relaxed">${z.opis}</p>
            <p class="text-xs font-bold text-blue-600">Zgłoszeń chętnych: ${totalApplicants} / 5</p>
            ${actionBtn}
        </div>
    `;

    // Załaduj opinie jeśli to profil wykonawcy
    const opinionsSec = document.getElementById('opinions-section');
    if (z.typ_wpisu === 'wykonawca') {
        opinionsSec.classList.remove('hidden');
        loadOpinions(z.user_id);
    } else {
        opinionsSec.classList.add('hidden');
    }
}

async function applyForJob(zlecenieId) {
    if (!currentProfile || currentProfile.punkty < 1) return alert("Nie masz punktów kontaktu!");
    const { error } = await db.from('zgloszenia').insert([{ zlecenie_id: zlecenieId, wykonawca_id: currentUser.id }]);
    if (error) alert(error.message); else { alert("Zgłoszono pomyślnie!"); checkUrlRoute(); updateUI({user: currentUser}); }
}

async function loadOpinions(wykonawcaId) {
    const { data } = await db.from('opinie').select('*').eq('wykonawca_id', wykonawcaId);
    const list = document.getElementById('opinions-list');
    if (!data || data.length === 0) { list.innerHTML = `<p class="text-xs text-slate-400">Brak opinii.</p>`; return; }
    list.innerHTML = data.map(o => `
        <div class="bg-slate-50 p-3 rounded-xl text-xs border border-slate-100">
            <div class="flex justify-between font-bold mb-1"><span>⭐ ${o.gwiazdki}/5</span><span class="text-slate-400">${o.autor_email}</span></div>
            <p class="text-slate-600">${o.tresc}</p>
        </div>
    `).join("");
}

async function submitOpinion() {
    const hash = window.location.hash;
    const id = hash.replace('#ogloszenie-', '');
    const { data: z } = await db.from("zlecenia").select("user_id").eq('id', id).single();

    const em = document.getElementById('op-email').value;
    const stars = parseInt(document.getElementById('op-stars').value);
    const text = document.getElementById('op-text').value;

    const { data: match } = await db.from('zlecenia').select('id').eq('user_id', z.user_id).single(); 
    const { error } = await db.from('opinie').insert([{ wykonawca_id: z.user_id, autor_email: em, gwiazdki: stars, tresc: text }]);
    
    if (error) alert(error.message); 
    else {
        if (stars >= 2) {
            await db.rpc('dodaj_punkty_za_opinie', { target_user: z.user_id, dodaj_pkt: stars });
        }
        alert("Opinia dodana!"); loadOpinions(z.user_id);
    }
}

async function loadAccountPanel() {
    const { data: posts } = await db.from('zlecenia').select('*').eq('user_id', currentUser.id);
    const postsList = document.getElementById('user-posts-list');
    postsList.innerHTML = posts && posts.length > 0 ? posts.map(p => `
        <div class="bg-slate-50 p-3 rounded-xl text-xs flex justify-between items-center border">
            <div><strong>${p.tytul}</strong> (Lokalizacja: ${p.miasto})</div>
            <div class="flex gap-2">
                <button onclick="editPost(${p.id})" class="text-blue-500 font-bold">Edytuj</button>
                <button onclick="del(${p.id})" class="text-red-500 font-bold">Usuń</button>
            </div>
        </div>
        <div id="applicants-${p.id}" class="pl-4 mt-1 space-y-1"></div>
    `).join("") : `<p class="text-xs text-slate-400">Brak dodanych ogłoszeń.</p>`;

    if(posts) {
        posts.forEach(async p => {
            if(p.typ_wpisu === 'klient') {
                const { data: app } = await db.from('zgloszenia').select('wykonawca_id, profile_wykonawcow(nazwa_firmy)').eq('zlecenie_id', p.id);
                const appBox = document.getElementById(`applicants-${p.id}`);
                if(app && app.length > 0) {
                    appBox.innerHTML = `<p class="text-[10px] font-bold text-amber-600">Chętni Wykonawcy:</p>` + app.map(a => `
                        <div class="text-[11px] bg-amber-50 p-2 rounded border flex justify-between items-center">
                            <span>🏗️ ${a.profile_wykonawcow?.nazwa_firmy || 'Fachowiec'}</span>
                            <button onclick="startChat('${a.wykonawca_id}', ${p.id})" class="bg-slate-800 text-white px-2 py-0.5 rounded text-[9px] font-bold uppercase">Czatuj / Odkryj telefon</button>
                        </div>
                    `).join("");
                }
            }
        });
    }

    const { data: chats } = await db.from('wiadomosci').select('zlecenie_id, zlecenia(tytul), nadawca_id, odbiorca_id').or(`nadawca_id.eq.${currentUser.id},odbiorca_id.eq.${currentUser.id}`);
    const chatsList = document.getElementById('user-chats-list');
    let uniqueChats = [];
    let seen = new Set();
    
    if(chats) {
        chats.forEach(c => {
            const partner = c.nadawca_id === currentUser.id ? c.odbiorca_id : c.nadawca_id;
            const key = `${partner}-${c.zlecenie_id}`;
            if(!seen.has(key)) {
                seen.add(key);
                uniqueChats.push({ partner, title: c.zlecenia?.tytul || "Zlecenie", zlId: c.zlecenie_id });
            }
        });
    }

    chatsList.innerHTML = uniqueChats.length > 0 ? uniqueChats.map(c => `
        <button onclick="openChatBox('${c.partner}', ${c.zlId})" class="w-full text-left bg-slate-100 p-2.5 rounded-xl text-xs font-bold border hover:bg-slate-200 transition-colors block">
            💬 Konwersacja dot. "${c.title}"
        </button>
    `).join("") : `<p class="text-xs text-slate-400">Brak aktywnych konwersacji.</p>`;
}

async function editPost(id) {
    const nT = prompt("Wpisz nowy tytuł:");
    const nO = prompt("Wpisz nowy opis:");
    if(nT && nO) {
        await db.from('zlecenia').update({ tytul: nT, opis: nO }).eq('id', id);
        loadAccountPanel();
    }
}

async function del(id) {
    if(confirm("Usunąć wpis?")) {
        await db.from("zlecenia").delete().eq('id', id);
        loadAccountPanel();
    }
}

function startChat(wykonawcaId, zlecenieId) {
    openChatBox(wykonawcaId, zlecenieId);
}

async function openChatBox(partnerId, zlId) {
    activeTargetId = partnerId;
    activeZlecenieId = zlId;
    document.getElementById('chat-box').classList.remove('hidden');
    loadMessages();
}

async function loadMessages() {
    if(!activeTargetId || !activeZlecenieId) return;
    const { data } = await db.from('wiadomosci').select('*').eq('zlecenie_id', activeZlecenieId).or(`and(nadawca_id.eq.${currentUser.id},odbiorca_id.eq.${activeTargetId}),and(nadawca_id.eq.${activeTargetId},odbiorca_id.eq.${currentUser.id})`).order('created_at', { ascending: true });
    
    const msgBox = document.getElementById('chat-messages');
    msgBox.innerHTML = data && data.length > 0 ? data.map(m => `
        <div class="p-2 rounded-lg ${m.nadawca_id === currentUser.id ? 'bg-blue-50 text-right ml-8' : 'bg-slate-100 mr-8'}">
            <p class="font-bold text-[10px] text-slate-400">${new Date(m.created_at).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}</p>
            <p>${m.tresc}</p>
        </div>
    `).join("") : `<p class="text-xs text-slate-400 text-center py-4">Brak wiadomości. Napisz pierwszy!</p>`;
    msgBox.scrollTop = msgBox.scrollHeight;
}

async function sendMessage() {
    const input = document.getElementById('chat-input');
    if(!input.value.trim()) return;
    const { error } = await db.from('wiadomosci').insert([{ zlecenie_id: activeZlecenieId, nadawca_id: currentUser.id, odbiorca_id: activeTargetId, tresc: input.value }]);
    if(!error) { input.value = ""; loadMessages(); }
}
</script>
