<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zlecremoncik</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

</head>
<body class="bg-gray-100">

<h1 style="text-align:center; margin-top:40px;">Zlecenia</h1>

<div id="list" style="max-width:600px; margin:20px auto;"></div>

<script>
const SUPABASE_URL = "https://uodwrtpaesemcizdhcht.supabase.co";

// 🔴 TU WKLEJ SWÓJ ANON KEY
const SUPABASE_KEY = "TU_WKLEJ_ANON_KEY";

const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

async function load() {
  const { data, error } = await supabaseClient
    .from("Zlecenia")
    .select("*");

  const el = document.getElementById("list");

  if (error) {
    el.innerHTML = "Błąd: " + error.message;
    return;
  }

  if (!data.length) {
    el.innerHTML = "Brak danych";
    return;
  }

  el.innerHTML = data.map(z => `
    <div style="background:#fff; padding:15px; margin-bottom:10px; border-radius:10px;">
      <b>${z.Tytuł}</b><br>
      ${z.Miasto}<br>
      ${z.Opis || ""}
    </div>
  `).join("");
}

load();
</script>

</body>
</html>
