<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZlećRemoncik - Fachowcy od ręki</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; }
        .card-shadow { box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05), 0 8px 10px -6px rgba(0, 0, 0, 0.05); }
        .fade-in { animation: fadeIn 0.5s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="text-slate-900">

<!-- NAWIGACJA -->
<nav class="bg-white/90 backdrop-blur-md sticky top-0 z-50 border-b border-slate-100">
    <div class="max-w-5xl mx-auto px-4 py-3 flex justify-between items-center">
        <div class="text-2xl font-extrabold tracking-tighter text-slate-800">
            Zleć<span class="text-blue-600">Remoncik</span>
        </div>
        <div id="user-info-area" class="flex items-center gap-3">
            <span id="user-info" class="text-[10px] font-bold text-slate-400 bg-slate-50 px-3 py-1 rounded-full uppercase tracking-wider"></span>
            <button id="logout-btn" onclick="signOut()" class="hidden text-[10px] font-bold text-red-400 hover:text-red-600 uppercase tracking-wider">Wyloguj</button>
        </div>
    </div>
</nav>

<header class="relative pt-24 pb-32 px-4 text-center overflow-hidden">
    <div class="absolute inset-0 z-0">
        <img src="kuchnia.png" alt="Tło" class="w-full h-full object-cover">
        <div class="absolute inset-0 bg-slate-900/60 backdrop-blur-[1px]"></div>
    </div>
    <div class="relative z-10 max-w-3xl mx-auto text-white">
        <h1 class="text-4xl md:text-6xl font-extrabold mb-4 tracking-tight drop-shadow-2xl">
            Znajdź fachowca, <br><span class="text-blue-400 italic">który zna się na rzeczy</span>
        </h1>
        <p class="text-blue-50 text-lg opacity-90 max-w-xl mx-auto font-medium">Szybko, lokalnie i bez zbędnych formalności.</p>
    </div>
</header>

<div class="max-w-3xl mx-auto px-4 -mt-8 relative z-20">
    
    <!-- PANEL USTAWIANIA NOWEGO HASŁA (UKRYTY DOMYŚLNIE) -->
    <div id="recovery-panel" class="hidden bg-white p-8 rounded-3xl card-shadow mb-12 border-2 border-green-400 fade-in">
        <h2 class="text-xl font-bold mb-4">Ustaw nowe hasło</h2>
        <p class="text-sm text-slate-500 mb-6">Wprowadź nowe bezpieczne hasło poniżej.</p>
        <div class="space-y-4">
            <input id="new-password" type="password" placeholder="Nowe hasło" class="w-full bg-slate-50 border-2 border-slate-50 p-4 rounded-2xl outline-none focus:border-blue-400 focus:bg-white transition-all text-slate-800">
            <button onclick="updatePassword()" class="w-full bg-green-600 text-white py-4 rounded-2xl font-bold hover:bg-green-700 shadow-lg transition-all">Zapisz nowe hasło</button>
        </div>
    </div>

    <!-- LOGOWANIE I RESET HASŁA -->
    <div id="auth-panel" class="bg-white p-8 rounded-3xl card-shadow mb-12 border border-slate-100">
        <h2 class="text-xl font-bold mb-6 text-slate-800">Panel użytkownika</h2>
        <div class="space-y-4">
            <input id="email" type="email" placeholder="E-mail" class="w-full bg-slate-50 border-2 border-slate-50 p-4 rounded-2xl outline-none focus:border-blue-400 focus:bg-white transition-all text-slate-800">
            <input id="password" type="password" placeholder="Hasło" class="w-full bg-slate-50 border-2 border-slate-50 p-4 rounded-2xl outline-none focus:border-blue-400 focus:bg-white transition-all text-slate-800">
            <div class="grid grid-cols-2 gap-4">
                <button onclick="signIn()" class="bg-blue-600 text-white py-4 rounded-2xl font-bold hover:bg-blue-700 shadow-lg transition-all">Zaloguj się</button>
                <button onclick="signUp()" class="bg-white text-slate-600 border-2 border-slate-100 py-4 rounded-2xl font-bold text-sm">Nowe konto</button>
            </div>
            <button onclick="resetPassword()" class="w-full text-xs text-slate-400 hover:text-blue-500 font-medium transition-colors">Zapomniałeś hasła? Kliknij tutaj.</button>
        </div>
    </div>

    <!-- PANEL DODAWANIA OGŁOSZENIA -->
    <div id="add-panel" class="hidden bg-white p-8 rounded-3xl card-shadow mb-12 border-2 border-blue-100 text-slate-800">
        <h2 class="text-2xl font-extrabold italic uppercase tracking-tighter mb-8">Nowe Ogłoszenie</h2>
        <div class="space-y-5">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <input id="t" placeholder="Tytuł usługi" class="w-full bg-slate-50 border-2 border-slate-50 p-3 rounded-xl focus:border-blue-400 outline-none">
                <input id="m" placeholder="Twoje Miasto" class="w-full bg-slate-50 border-2 border-slate-50 p-3 rounded-xl focus:border-blue-400 outline-none">
            </div>
            <textarea id="o" placeholder="Opis prac..." class="w-full bg-slate-50 border-2 border-slate-50 p-3 rounded-xl h-28 focus:border-blue-400 outline-none"></textarea>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <input id="p" type="tel" maxlength="9" oninput="this.value = this.value.replace(/[^0-9]/g, '')" placeholder="Numer telefonu" class="w-full bg-slate-50 border-2 border-slate-50 p-3 rounded-xl focus:border-blue-400 outline-none">
                <input id="img-input" type="file" accept="image/*" class="w-full text-xs text-slate-400 file:py-3 file:px-4 file:rounded-xl">
            </div>
            <button onclick="add()" id="add-btn" class="w-full bg-blue-600 text-white py-5 rounded-2xl font-extrabold text-lg shadow-xl hover:bg-blue-700 uppercase tracking-tight">Opublikuj ogłoszenie</button>
        </div>
    </div>

    <div id="list" class="space-y-8 pb-20 mt-10"></div>
</div>

<script>
const SUPABASE_URL = "https://uodwrtpaesemcizdhcht.supabase.co";
const SUPABASE_KEY = "sb_publishable_WVkoJLfkTfUD95EeSZMDQQ_VEhzlW6n";
const db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// LOGOWANIE I RESET
async function signUp() {
    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;
    const { error } = await db.auth.signUp({ email, password });
    if (error) alert(error.message); else alert("Sprawdź maila i potwierdź konto!");
}
async function signIn() {
    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;
    const { error } = await db.auth.signInWithPassword({ email, password });
    if (error) alert("Błąd: " + error.message);
}
async function signOut() { await db.auth.signOut(); location.reload(); }

async function resetPassword() {
    const email = document.getElementById('email').value;
    if (!email) { alert("Wpisz e-mail!"); return; }
    const { error } = await db.auth.resetPasswordForEmail(email, { redirectTo: window.location.origin });
    if (error) alert(error.message); else alert("Link do resetowania wysłany na maila!");
}

// NOWA FUNKCJA: ZMIANA HASŁA PO WEJŚCIU Z LINKU
async function updatePassword() {
    const newPass = document.getElementById('new-password').value;
    if (newPass.length < 6) { alert("Hasło musi mieć min. 6 znaków!"); return; }
    const { error } = await db.auth.updateUser({ password: newPass });
    if (error) alert(error.message); 
    else {
        alert("Hasło zmienione pomyślnie! Możesz teraz korzystać z serwisu.");
        document.getElementById('recovery-panel').classList.add('hidden');
    }
}

// OBSŁUGA ZDARZEŃ AUTH
db.auth.onAuthStateChange((event, session) => {
    const authPanel = document.getElementById('auth-panel');
    const addPanel = document.getElementById('add-panel');
    const userInfo = document.getElementById('user-info');
    const logoutBtn = document.getElementById('logout-btn');
    const recoveryPanel = document.getElementById('recovery-panel');

    // JEŚLI TO LINK DO RESETU HASŁA
    if (event === "PASSWORD_RECOVERY") {
        recoveryPanel.classList.remove('hidden');
        authPanel.classList.add('hidden');
        addPanel.classList.add('hidden');
        return;
    }

    if (session) {
        authPanel.classList.add('hidden');
        addPanel.classList.remove('hidden');
        userInfo.innerText = session.user.email;
        logoutBtn.classList.remove('hidden');
    } else {
        authPanel.classList.remove('hidden');
        addPanel.classList.add('hidden');
        userInfo.innerText = "";
        logoutBtn.classList.add('hidden');
    }
});

// DODAWANIE (SKRÓCONE DO TESTU)
async function add() {
    const t = document.getElementById("t").value;
    const m = document.getElementById("m").value;
    const o = document.getElementById("o").value;
    const p = document.getElementById("p").value;
    if (!t || !m || !o || p.length !== 9) { alert("Wypełnij wszystko poprawnie!"); return; }
    const { data: { user } } = await db.auth.getUser();
    const { error } = await db.from("Zlecenia").insert([{ Tytuł: t, Miasto: m, Opis: o, Telefon: p, user_email: user.email }]);
    if (error) alert(error.message); else location.reload();
}

async function load() {
    const { data } = await db.from("Zlecenia").select("*").order("id", { ascending: false });
    const el = document.getElementById("list");
    if (data) el.innerHTML = data.map(z => `<div class="bg-white p-6 rounded-3xl mb-4 card-shadow"><b>${z.Tytuł}</b><br>${z.Opis}</div>`).join("");
}
load();
</script>
</body>
</html>
