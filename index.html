<!-- Dodaj to w sekcji rejestracji (auth-panel) -->
<div id="auth-panel" class="bg-white p-8 rounded-3xl card-shadow mb-12 border border-slate-100">
    <h2 class="text-xl font-bold mb-6 text-slate-800 uppercase">Dołącz do ZlećRemoncik</h2>
    <div class="space-y-4">
        <input id="email" type="email" placeholder="E-mail" class="w-full bg-slate-50 border-2 p-4 rounded-2xl outline-none focus:border-blue-400">
        <input id="password" type="password" placeholder="Hasło" class="w-full bg-slate-50 border-2 p-4 rounded-2xl outline-none focus:border-blue-400">
        
        <!-- WYBÓR ROLI -->
        <div class="flex gap-2 p-1 bg-slate-100 rounded-2xl">
            <button id="role-user" onclick="setRole('klient')" class="flex-1 py-2 rounded-xl text-xs font-bold bg-white shadow-sm transition-all">SZUKAM FACHOWCA</button>
            <button id="role-pro" onclick="setRole('wykonawca')" class="flex-1 py-2 rounded-xl text-xs font-bold text-slate-500 hover:bg-white transition-all">JESTEM FACHOWCEM</button>
        </div>

        <div class="grid grid-cols-2 gap-4">
            <button onclick="signIn()" class="bg-blue-600 text-white py-4 rounded-2xl font-bold uppercase text-sm">Zaloguj</button>
            <button onclick="signUp()" class="bg-slate-800 text-white py-4 rounded-2xl font-bold uppercase text-sm">Załóż konto</button>
        </div>
    </div>
</div>

<!-- Zmiana w formularzu dodawania (add-panel) -->
<div id="add-panel" class="hidden bg-white p-8 rounded-3xl card-shadow mb-12 border-2 border-blue-100">
    <h2 id="add-title" class="text-2xl font-black italic uppercase mb-6">Dodaj ogłoszenie</h2>
    <div class="space-y-4">
        <input id="t" placeholder="Tytuł (np. Wyremontuję łazienkę / Zlecę malowanie)" class="w-full bg-slate-50 border-2 p-3 rounded-xl outline-none">
        <!-- Reszta pól zostaje bez zmian -->
        <input id="m" placeholder="Miasto" class="w-full bg-slate-50 border-2 p-3 rounded-xl outline-none">
        <select id="k" class="w-full bg-slate-50 border-2 p-3 rounded-xl outline-none">
            <option value="Remont">🏠 Remont</option>
            <option value="Budowa">🏗️ Budowa</option>
            <option value="Ogród">🌱 Ogród</option>
        </select>
        <textarea id="o" placeholder="Opis szczegółowy..." class="w-full bg-slate-50 border-2 p-3 rounded-xl h-24 outline-none"></textarea>
        <input id="p" type="tel" maxlength="9" placeholder="Telefon kontaktowy" class="w-full bg-slate-50 border-2 p-3 rounded-xl outline-none">
        <input id="img-input" type="file" accept="image/*" class="text-xs">
        <button onclick="add()" id="add-btn" class="w-full bg-blue-600 text-white py-4 rounded-2xl font-black shadow-xl uppercase">Opublikuj teraz</button>
    </div>
</div>
