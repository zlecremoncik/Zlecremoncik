<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zlecremoncik</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body class="bg-gray-100 font-sans">

<div class="bg-white shadow p-4 flex justify-between items-center flex-wrap gap-4">
  <b class="text-blue-600 text-xl">ZLECREMONCIK</b>
  
  <div class="flex items-center gap-2">
    <span class="text-sm text-gray-500">Pokaż:</span>
    <select id="f" onchange="load()" class="border p-2 rounded-lg text-sm bg-gray-50">
      <option value="Wszystkie">Wszystkie</option>
      <option value="Remont">Remont</option>
      <option value="Budowa">Budowa</option>
      <option value="Ogród">Ogród</option>
      <option value="Inne">Inne</option>
    </select>
  </div>

  <button onclick="openModal()" class="bg-blue-600 text-white px-4 py-2 rounded-lg font-bold">+ Dodaj zlecenie</button>
</div>

<div class="bg-blue-600 text-white text-center py-12">
  <h1 class="text-3xl font-bold">Znajdź fachowca w Twojej okolicy</h1>
  <p class="text-blue-100 mt-2">Filtruj ogłoszenia i sprawdzaj daty</p>
</div>

<div id="list" class="max-w-3xl mx-auto p-4 space-y-4">
  <p class="text-center text-gray-500">Ładowanie...</p>
</div>

<div id="modal" class="fixed inset-0 bg-black bg-opacity-50 hidden flex justify-center items-center p-4">
  <div class="bg-white p-6 rounded-xl w-full max-w-md">
    <h2 class="text-xl font-bold mb-4">Dodaj zlecenie</h2>

    <input id="t" placeholder="Tytuł (np. Malowanie ścian)" class="w-full border p-2 mb-2 rounded">
    <input id="m" placeholder="Miasto" class="w-full border p-2 mb-2 rounded">
    
    <label class="text-xs text-gray-500">Wybierz kategorię:</label>
    <select id="k" class="w-full border p-2 mb-2 rounded bg-gray-50">
      <option value="Remont">Remont</option>
      <option value="Budowa">Budowa</option>
      <option value="Ogród">Ogród</option>
      <option value="Inne">Inne</option>
    </select>

    <textarea id="o" placeholder="Opis zlecenia..." class="w-full border p-2 mb-2 rounded"></textarea>
    <input id="p" type="tel" placeholder="Numer telefonu" class="w-full border p-2 mb-4 rounded">

    <button onclick="add()" class="bg-green-600 text-white w-full py-2 rounded-lg font-bold">Opublikuj</button>
    <button onclick="closeModal()" class="mt-2 text-gray-500 w-full text-sm text-center">Anuluj</button>
  </div>
</div>

<script>
const SUPABASE_URL = "https://uodwrtpaesemcizdhcht.supabase.co";
const SUPABASE_KEY = "sb_publishable_WVkoJLfkTfUD95EeSZMDQQ_VEhzlW6n";
const db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

async function load() {
  const filtr = document.getElementById("f").value;
  
  // Budujemy zapytanie do bazy
  let query = db.from("Zlecenia").select("*").order("id", { ascending: false });

  // Jeśli wybraliśmy coś innego niż "Wszystkie", filtrujemy
  if (filtr !== "Wszystkie") {
    query = query.eq("Kategoria", filtr);
  }

  const { data, error } = await query;
  const el = document.getElementById("list");

  if (error) { el.innerHTML = `<div class="bg-red-200 p-4 rounded">${error.message}</div>`; return; }
  if (!data || data.length === 0) { el.innerHTML = `<p class="text-center text-gray-400">Brak zleceń</p>`; return; }

  el.innerHTML = data.map(z => {
    // Formatowanie daty na polski format (DD.MM.RRRR)
    const dataTekst = z.created_at ? new Date(z.created_at).toLocaleDateString('pl-PL') : '';

    return `
      <div class="bg-white p-4 rounded-lg shadow border-l-4 border-blue-500 relative">
        <span class="absolute top-2 right-4 text-[10px] text-gray-400 font-mono">${dataTekst}</span>
        
        <div class="font-bold text-lg text-gray-800">${z.Tytuł || ''}</div>
        
        <div class="flex gap-2 items-center mb-2">
          <div class="text-blue-600 text-sm font-semibold">${z.Miasto || ''}</div>
          <span class="text-[10px] bg-blue-50 text-blue-500 px-2 rounded-full uppercase font-bold">${z.Kategoria || 'Inne'}</span>
        </div>

        <div class="mt-2 text-gray-700 text-sm">${z.Opis || ''}</div>
        
        ${z.Telefon ? `
          <div class="mt-3 pt-2 border-t flex items-center justify-between">
            <span class="text-xs text-gray-500 italic">Kontakt:</span>
            <a href="tel:${z.Telefon}" class="bg-green-100 text-green-700 px-3 py-1 rounded-md font-bold text-sm">
              📞 ${z.Telefon}
            </a>
          </div>
        ` : ''}
      </div>
    `;
  }).join("");
}

async function add() {
  const { error } = await db.from("Zlecenia").insert([{
    Tytuł: document.getElementById("t").value,
    Miasto: document.getElementById("m").value,
    Opis: document.getElementById("o").value,
    Telefon: document.getElementById("p").value,
    Kategoria: document.getElementById("k").value // WYSYŁANIE KATEGORII
  }]);

  if (error) {
    alert("Błąd: " + error.message);
  } else {
    document.getElementById("t").value = "";
    document.getElementById("m").value = "";
    document.getElementById("o").value = "";
    document.getElementById("p").value = "";
    closeModal();
    load();
  }
}

function openModal() { document.getElementById("modal").classList.remove("hidden"); }
function closeModal() { document.getElementById("modal").classList.add("hidden"); }

load();
</script>
</body>
</html>
