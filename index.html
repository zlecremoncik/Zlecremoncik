<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZlećRemoncik</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.tailwindcss.com"></script>

<style>
body { font-family: Arial; background:#f8fafc; }
</style>
</head>

<body>

<!-- HEADER -->
<div style="position:relative;height:250px;color:white;text-align:center;">
    <img src="kuchnia.png" style="position:absolute;width:100%;height:100%;object-fit:cover;">
    <div style="position:absolute;width:100%;height:100%;background:rgba(0,0,0,0.6);"></div>
    <div style="position:relative;top:70px;">
        <h1 style="font-size:30px;font-weight:bold;">Zleć remont</h1>
    </div>
</div>

<div style="max-width:500px;margin:auto;padding:20px;">

<!-- LOGOWANIE -->
<div id="auth">
<input id="email" placeholder="email" style="width:100%;padding:10px;margin-bottom:10px;">
<input id="password" type="password" placeholder="hasło" style="width:100%;padding:10px;margin-bottom:10px;">
<button onclick="login()" style="width:100%;padding:10px;background:blue;color:white;">Zaloguj</button>
</div>

<!-- DODAWANIE -->
<div id="add" style="display:none;">
<input id="t" placeholder="Tytuł" style="width:100%;padding:10px;margin-top:10px;">
<input id="m" placeholder="Miasto" style="width:100%;padding:10px;margin-top:10px;">
<textarea id="o" placeholder="Opis" style="width:100%;padding:10px;margin-top:10px;"></textarea>
<input id="p" placeholder="Telefon" style="width:100%;padding:10px;margin-top:10px;">
<input id="img" type="file" style="margin-top:10px;">
<button onclick="addPost()" id="btn" style="width:100%;padding:10px;background:black;color:white;margin-top:10px;">Dodaj</button>
</div>

<!-- LISTA -->
<div id="list"></div>

</div>

<script>
const db = supabase.createClient(
"https://uodwrtpaesemcizdhcht.supabase.co",
"sb_publishable_WVkoJLfkTfUD95EeSZMDQQ_VEhzlW6n"
);

// LOGIN
async function login(){
    await db.auth.signInWithPassword({
        email: email.value,
        password: password.value
    });
}

// SESSION
db.auth.onAuthStateChange((e,s)=>{
    if(s){
        auth.style.display="none";
        add.style.display="block";
    }
    load();
});

// DODAWANIE (NAPRAWIONE)
async function addPost(){
    let btn = document.getElementById("btn");
    btn.innerText="Dodawanie...";
    btn.disabled=true;

    let photo="";

    try{
        let file = document.getElementById("img").files[0];

        if(file){
            let name = Date.now()+file.name;

            let upload = await db.storage
                .from("zdjecia")
                .upload(name,file);

            if(!upload.error){
                photo = db.storage
                    .from("zdjecia")
                    .getPublicUrl(name).data.publicUrl;
            }
        }
    }catch(e){
        console.log("bez zdjęcia");
    }

    await db.from("Zlecenia").insert([{
        Tytuł:t.value,
        Miasto:m.value,
        Opis:o.value,
        Telefon:p.value,
        zdjecie_url:photo
    }]);

    location.reload();
}

// LISTA
async function load(){
    let {data} = await db.from("Zlecenia").select("*").order("id",{ascending:false});

    list.innerHTML = data.map(x=>`
        <div style="background:white;margin-top:20px;padding:10px;">
            ${x.zdjecie_url ? `<img src="${x.zdjecie_url}" style="width:100%;">` : ""}
            <b>${x.Tytuł}</b><br>
            ${x.Miasto}<br>
            ${x.Opis}<br>
            <a href="tel:${x.Telefon}" style="color:green;">${x.Telefon}</a>
        </div>
    `).join("");
}

load();
</script>

</body>
</html>
