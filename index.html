<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZlećRemoncik - Fachowcy od ręki</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.7/dist/umd/supabase.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; }
        .card-shadow { box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05); }
        .hidden { display: none !important; }
        .loader { border-top-color: #3b82f6; animation: spinner 0.6s linear infinite; }
        @keyframes spinner { to { transform: rotate(360deg); } }
    </style>
</head>
<body class="text-slate-900">

<nav class="bg-white/90 backdrop-blur-md sticky top-0 z-50 border-b border-slate-100">
    <div class="max-w-5xl mx-auto px-4 py-3 flex justify-between items-center">
        <div class="text-2xl font-extrabold tracking-tighter text-slate-800">Zleć<span class="text-blue-600">Remoncik</span></div>
        <div class="flex items-center gap-3">
            <span id="user-info" class="text-[10px] font-bold text-slate-400 bg-slate-50 px-3 py-1 rounded-full uppercase"></span>
            <button id="logout-btn" onclick="signOut()" class="hidden text-[10px] font-bold text-red-400 hover:text-red-600 uppercase">Wyloguj</button>
        </div>
    </div>
</nav>

<header class="relative pt-24 pb-32 px-4 text-center overflow-hidden">
    <div class="absolute inset-0 z-0">
        <img src="kuchnia.png" alt="Tło" class="w-full h-full object-cover">
        <div class="absolute inset-0 bg-slate-900/60 backdrop-blur-[1px]"></div>
    </div>
    <div class="relative z-10 max-w-3xl mx-auto text-white">
        <h1 class="text-4xl md:text-6xl font-extrabold mb-4 tracking-tight uppercase italic">Potrzebujesz fachowca?</h1>
        <p class="text-blue-100 opacity-90 font-medium text-lg">Zleć remont w 30 sekund.</p>
    </div>
</header>

<main class="max-w-3xl mx-auto px-4 -mt-10 relative z-20">
    <!-- LOGOWANIE -->
    <div id="auth-panel" class="bg-white p-8 rounded-3xl card-shadow mb-12 border border-slate-100">
        <h2 class="text-xl font-bold mb-6">Zaloguj się</h2>
        <div class="space-y-4">
            <input id="email" type="email" placeholder="E-mail" class="w-full bg-slate-50 border-2 p-4 rounded-2xl outline-none focus:border-blue-400">
            <input id="password" type="password" placeholder="Hasło" class="w-full bg-slate-50 border-2 p-4 rounded-2xl outline-none focus:border-blue-400">
            <div class="grid grid-cols-2 gap-4">
                <button onclick="signIn()" class="bg-blue-600 text-white py-4 rounded-2xl font-bold uppercase text-sm">Zaloguj</button>
                <button onclick="signUp()" class="bg-white text-slate-500 border-2 py-4 rounded-2xl font-bold uppercase text-sm">Dołącz</button>
            </div>
        </div>
    </div>

    <!-- FILTRY -->
    <div class="mb-8 flex flex-wrap gap-2 justify-center">
        <button onclick="filterKategoria('Wszystkie')" class="px-4 py-2 bg-white border border-slate-200 rounded-full text-xs font-bold hover:bg-blue-600 hover:text-white transition-all shadow-sm">Wszystkie</button>
        <button onclick="filterKategoria('Remont')" class="px-4 py-2 bg-white border border-slate-200 rounded-full text-xs font-bold hover:bg-blue-600 hover:text-white transition-all shadow-sm">🏠 Remont</button>
        <button onclick="filterKategoria('Budowa')" class="px-4 py-2 bg-white border border-slate-200 rounded-full text-xs font-bold hover:bg-blue-600 hover:text-white transition-all shadow-sm">🏗️ Budowa</button>
        <button onclick="filterKategoria('Ogród')" class="px-4 py-2 bg-white border border-slate-200 rounded-full text-xs font-bold hover:bg-blue-600 hover:text-white transition-all shadow-sm">🌱 Ogród</button>
    </div>

    <!-- DODAWANIE -->
    <div id="add-panel" class="hidden bg-white p-8 rounded-3xl card-shadow mb-12 border-2 border-blue-50">
        <h2 class="text-2xl font-black italic uppercase mb-8">Dodaj zlecenie</h2>
        <div class="space-y-4">
            <input id="t" placeholder="Tytuł" class="w-full bg-slate-50 border-2 p-3 rounded-xl focus:border-blue-400 outline-none">
            <div class="grid grid-cols-2 gap-4">
                <input id="m" placeholder="Miasto" class="w-full bg-slate-50 border-2 p-3 rounded-xl outline-none">
                <select id="k" class="w-full bg-slate-50 border-2 p-3 rounded-xl outline-none text-sm">
                    <option value="Remont">🏠 Remont</option>
                    <option value="Budowa">🏗️ Budowa</option>
                    <option value="Ogród">🌱 Ogród</option>
                    <option value="Inne">🛠️ Inne</option>
                </select>
            </div>
            <textarea id="o" placeholder="Opis..." class="w-full bg-slate-50 border-2 p-3 rounded-xl h-24 outline-none"></textarea>
            <input id="p" type="tel" maxlength="9" placeholder="Telefon (9 cyfr)" class="w-full bg-slate-50 border-2 p-3 rounded-xl outline-none">
            
            <div class="flex items-center gap-4 p-2 bg-blue-50 rounded-xl">
                <input id="img-input" type="file" accept="image/*" class="text-xs flex-1">
                <div id="upload-spinner" class="hidden loader w-5 h-5 border-2 rounded-full"></div>
            </div>

            <button onclick="add()" id="add-btn" class="w-full bg-blue-600 text-white py-4 rounded-2xl font-black shadow-xl uppercase transition-all">Opublikuj</button>
        </div>
    </div>

    <div id="list" class="space-y-8 pb-20"></div>
</main>

<script>
const SUPABASE_URL = "https://uodwrtpaesemcizdhcht.supabase.co";
const SUPABASE_KEY = "sb_publishable_WVkoJLfkTfUD95EeSZMDQQ_VEhzlW6n";
const db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let currentUser = null;
let currentFilter = 'Wszystkie';

db.auth.onAuthStateChange(async (event, session) => {
    currentUser = session?.user || null;
    document.getElementById('auth-panel').classList.toggle('hidden', !!session);
    document.getElementById('add-panel').classList.toggle('hidden', !session);
    document.getElementById('logout-btn').classList.toggle('hidden', !session);
    document.getElementById('user-info').innerText = session ? session.user.email : "";
    load();
});

async function filterKategoria(kat) {
    currentFilter = kat;
    load();
}

async function signIn() {
    const { error } = await db.auth.signInWithPassword({ email: email.value, password: password.value });
    if (error) alert(error.message);
}

async function signUp() {
    const { error } = await db.auth.signUp({ email: email.value, password: password.value });
    if (error) alert(error.message); else alert("Gotowe!");
}

async function signOut() { await db.auth.signOut(); window.location.reload(); }

async function add() {
    const btn = document.getElementById('add-btn');
    const spinner = document.getElementById('upload-spinner');
    
    if (p.value.length !== 9) { alert("Popraw telefon!"); return; }
    
    btn.disabled = true;
    spinner.classList.remove('hidden');

    const file = document.getElementById('img-input').files[0];
    let photoUrl = "";
    if (file) {
        const fileName = `${Date.now()}_img`;
        await db.storage.from('zdjecia').upload(fileName, file);
        photoUrl = db.storage.from('zdjecia').getPublicUrl(fileName).data.publicUrl;
    }

    const { error } = await db.from("Zlecenia").insert([{ 
        Tytuł: t.value, Miasto: m.value, Opis: o.value, 
        Telefon: p.value, Kategoria: k.value, zdjecie_url: photoUrl,
        user_id: currentUser.id, views: 0 
    }]);

    if (error) alert(error.message); else window.location.reload();
}

async function deleteAd(id) {
    if(confirm("Usunąć to ogłoszenie?")) {
        await db.from("Zlecenia").delete().eq('id', id);
        load();
    }
}

async function load() {
    let query = db.from("Zlecenia").select("*").order("id", { ascending: false });
    if (currentFilter !== 'Wszystkie') query = query.eq('Kategoria', currentFilter);
    
    const { data } = await query;
    const listEl = document.getElementById("list");
    if (!data) return;

    listEl.innerHTML = data.map(z => {
        const isOwner = currentUser && z.user_id === currentUser.id;
        const d = new Date(z.created_at).toLocaleString('pl-PL', { day: '2-digit', month: '2-digit', year: 'numeric', hour: '2-digit', minute: '2-digit' });

        return `
            <div class="bg-white rounded-[2rem] card-shadow overflow-hidden border border-slate-100 mb-6">
                ${z.zdjecie_url ? `<img src="${z.zdjecie_url}" class="w-full h-64 object-cover">` : ''}
                <div class="p-8">
                    <div class="flex justify-between items-start mb-3">
                        <span class="text-[10px] font-black bg-blue-50 text-blue-600 px-3 py-1 rounded-full uppercase">${z.Kategoria}</span>
                        <div class="flex flex-col items-end">
                            <span class="text-[9px] text-slate-300 font-bold">${d}</span>
                            <span class="text-[9px] text-blue-300">👁️ ${z.views || 0}</span>
                        </div>
                    </div>
                    <h3 class="text-2xl font-black mb-1 text-slate-800">${z.Tytuł}</h3>
                    <div class="text-blue-500 font-bold text-sm mb-4 italic">📍 ${z.Miasto}</div>
                    <p class="text-slate-600 text-sm bg-slate-50 p-4 rounded-2xl mb-6">"${z.Opis}"</p>
                    
                    ${currentUser 
                        ? `<a href="tel:${z.Telefon}" onclick="incrementView(${z.id}, ${z.views || 0})" class="block w-full bg-green-500 text-white text-center py-4 rounded-xl font-black shadow-lg mb-2">📞 ZADZWOŃ</a>`
                        : `<button class="block w-full bg-slate-100 text-slate-400 py-4 rounded-xl font-bold cursor-not-allowed">🔒 Zaloguj się by zadzwonić</button>`
                    }

                    ${isOwner ? `<button onclick="deleteAd(${z.id})" class="w-full mt-2 text-[10px] font-bold text-red-400 uppercase tracking-widest hover:text-red-600">Usuń moje ogłoszenie</button>` : ''}
                </div>
            </div>
        `;
    }).join("");
}

async function incrementView(id, currentViews) {
    await db.from("Zlecenia").update({ views: currentViews + 1 }).eq('id', id);
}
</script>
</body>
</html>
