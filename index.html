<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zlecremoncik - Dodaj Zlecenie</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Biblioteka Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-gray-50 font-sans">

    <nav class="bg-white shadow-sm py-4 px-6 mb-10">
        <div class="max-w-6xl mx-auto flex justify-between items-center">
            <div class="text-2xl font-bold text-blue-600">Zlecremoncik</div>
            <a href="index.html" class="text-gray-600">Powrót</a>
        </div>
    </nav>

    <div class="max-w-xl mx-auto bg-white p-8 rounded-2xl shadow-xl">
        <h2 class="text-2xl font-bold mb-6 text-gray-800">Dodaj nowe zlecenie</h2>
        
        <form id="orderForm" class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-gray-700">Co jest do zrobienia?</label>
                <input type="text" id="tytul" required placeholder="np. Remont łazienki 5m2" class="w-full p-3 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700">Miasto</label>
                <input type="text" id="miasto" required placeholder="np. Warszawa" class="w-full p-3 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700">Opis szczegółowy</label>
                <textarea id="opis" rows="4" placeholder="Opisz dokładnie zakres prac..." class="w-full p-3 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none"></textarea>
            </div>
            <button type="submit" id="submitBtn" class="w-full bg-blue-600 text-white font-bold py-3 rounded-lg hover:bg-blue-700 transition">Opublikuj zlecenie</button>
        </form>
        
        <div id="status" class="mt-4 text-center hidden"></div>
    </div>

    <script>
        // --- KONFIGURACJA SUPABASE ---
        // PODMIEŃ PONIŻSZE DANE NA TWOJE Z SUPABASE:
        const SUPABASE_URL = 'https://uodwrtpaesemcizdhcht.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_WVkoJLfkTfUD95EeSZMDQQ_VEhzlW6n';
        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const form = document.getElementById('orderForm');
        const statusDiv = document.getElementById('status');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const submitBtn = document.getElementById('submitBtn');
            submitBtn.disabled = true;
            submitBtn.innerText = 'Wysyłanie...';

            const tytul = document.getElementById('tytul').value;
            const miasto = document.getElementById('miasto').value;
            const opis = document.getElementById('opis').value;

            // WYSYŁANIE DO BAZY
            const { data, error } = await supabase
                .from('zlecenia')
                .insert([{ tytul, miasto, opis }]);

            statusDiv.classList.remove('hidden');
            if (error) {
                statusDiv.innerText = 'Błąd: ' + error.message;
                statusDiv.className = 'mt-4 text-center text-red-600';
            } else {
                statusDiv.innerText = 'Sukces! Zlecenie zostało dodane.';
                statusDiv.className = 'mt-4 text-center text-green-600';
                form.reset();
            }
            
            submitBtn.disabled = false;
            submitBtn.innerText = 'Opublikuj zlecenie';
        });
    </script>
</body>
</html>
