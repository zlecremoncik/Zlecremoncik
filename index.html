<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zlecremoncik - Twoje Zlecenia</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-gray-50 font-sans">

    <!-- Nawigacja -->
    <nav class="bg-white shadow-sm p-4 sticky top-0 z-50">
        <div class="max-w-6xl mx-auto flex justify-between items-center">
            <h1 class="text-2xl font-black text-blue-600 tracking-tighter">ZLECREMONCIK</h1>
            <button onclick="document.getElementById('modal').classList.remove('hidden')" class="bg-blue-600 text-white px-6 py-2 rounded-full font-bold hover:bg-blue-700 transition shadow-lg">
                + Dodaj zlecenie
            </button>
        </div>
    </nav>

    <!-- Hero Section -->
    <header class="bg-blue-600 text-white py-12 px-4 text-center">
        <h2 class="text-3xl font-bold mb-2">Znajdź fachowca w Twojej okolicy</h2>
        <p class="opacity-80">Przeglądaj najnowsze zapytania od klientów</p>
    </header>

    <!-- Lista zleceń -->
    <main class="max-w-4xl mx-auto p-6">
        <div id="zlecenia-list" class="grid gap-4">
            <p class="text-center text-gray-500 animate-pulse">Ładowanie zleceń z bazy...</p>
        </div>
    </main>

    <!-- Pop-up z formularzem -->
    <div id="modal" class="fixed inset-0 bg-black/60 hidden flex items-center justify-center p-4 z-[100] backdrop-blur-sm">
        <div class="bg-white rounded-2xl w-full max-w-md p-8 relative shadow-2xl">
            <button onclick="document.getElementById('modal').classList.add('hidden')" class="absolute top-4 right-4 text-gray-400 hover:text-gray-800 text-2xl">&times;</button>
            <h2 class="text-2xl font-bold mb-6 text-gray-800">Co chcesz zlecić?</h2>
            
            <form id="orderForm" class="space-y-4">
                <div>
                    <label class="block text-xs font-bold text-gray-500 uppercase mb-1">Tytuł zlecenia</label>
                    <input type="text" id="tytulInput" required placeholder="np. Malowanie mieszkania" class="w-full p-3 border border-gray-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none">
                </div>
                <div>
                    <label class="block text-xs font-bold text-gray-500 uppercase mb-1">Miasto</label>
                    <input type="text" id="miastoInput" required placeholder="np. Warszawa" class="w-full p-3 border border-gray-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none">
                </div>
                <div>
                    <label class="block text-xs font-bold text-gray-500 uppercase mb-1">Szczegóły</label>
                    <textarea id="opisInput" rows="3" placeholder="Opisz czego potrzebujesz..." class="w-full p-3 border border-gray-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none"></textarea>
                </div>
                <button type="submit" id="submitBtn" class="w-full bg-green-500 text-white font-bold py-4 rounded-xl hover:bg-green-600 transition shadow-md">
                    Opublikuj zlecenie
                </button>
            </form>
        </div>
    </div>

    <script>
        // TWOJE DANE ZACIĄGNIĘTE ZE SCREENA
        const SUPABASE_URL = 'https://uodwrtpaesemcizdhcht.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_WVkkoJLfkTfUD95EeSZMDQQ_VEhzlW6n';
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // 1. POBIERANIE I WYŚWIETLANIE ZLECEŃ
        async function fetchZlecenia() {
            const { data, error } = await supabaseClient
                .from('Zlecenia') // Upewnij się, że w Supabase tabela nazywa się dokładnie tak (z wielkiej litery)
                .select('*')
                .order('id', { ascending: false });

            const list = document.getElementById('zlecenia-list');
            
            if (error) {
                list.innerHTML = `<div class="bg-red-100 p-4 rounded-xl text-red-700 font-bold text-center">Błąd bazy: ${error.message}</div>`;
                return;
            }

            if (data.length === 0) {
                list.innerHTML = '<div class="text-center py-10 text-gray-400">Brak zleceń. Dodaj pierwsze!</div>';
                return;
            }

            list.innerHTML = data.map(z => `
                <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100 hover:shadow-md transition">
                    <div class="flex justify-between items-start mb-2">
                        <h4 class="text-xl font-bold text-gray-900">${z.Tytuł}</h4>
                        <span class="bg-blue-50 text-blue-600 text-xs px-3 py-1 rounded-full font-bold">${z.Miasto}</span>
                    </div>
                    <p class="text-gray-600 mb-4">${z.Opis || 'Brak dodatkowego opisu.'}</p>
                    <button class="w-full py-2 bg-gray-50 text-blue-600 font-bold rounded-lg border border-blue-100 hover:bg-blue-600 hover:text-white transition">
                        Licytuj to zlecenie
                    </button>
                </div>
            `).join('');
        }

        // 2. DODAWANIE NOWEGO ZLECENIA
        document.getElementById('orderForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            btn.disabled = true;
            btn.innerText = 'Wysyłanie...';

            const payload = {
                Tytuł: document.getElementById('tytulInput').value,
                Miasto: document.getElementById('miastoInput').value,
                Opis: document.getElementById('opisInput').value
            };

            const { error } = await supabaseClient.from('Zlecenia').insert([payload]);

            if (error) {
                alert("Błąd podczas dodawania: " + error.message);
            } else {
                document.getElementById('modal').classList.add('hidden');
                document.getElementById('orderForm').reset();
                fetchZlecenia(); // Odśwież listę bez przeładowania strony
            }
            btn.disabled = false;
            btn.innerText = 'Opublikuj zlecenie';
        });

        // Odpalenie pobierania przy wejściu na stronę
        fetchZlecenia();
    </script>
</body>
</html>
