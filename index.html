<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zlecremoncik - Panel Fachowca</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-gray-100 font-sans">

<div class="bg-white shadow-md p-4 flex justify-between items-center sticky top-0 z-50">
    <b class="text-blue-600 text-2xl tracking-tighter">ZLECREMONCIK</b>
    <div id="user-info" class="text-[10px] font-bold text-gray-500 uppercase"></div>
</div>

<div class="max-w-3xl mx-auto p-4">

    <div id="auth-panel" class="bg-white p-8 rounded-3xl shadow-lg mb-8 border-2 border-blue-100">
        <h2 class="text-2xl font-black mb-6 text-center text-gray-800 italic">Twoje konto fachowca</h2>
        <div class="space-y-4">
            <input id="email" type="email" placeholder="Twój e-mail" class="w-full border-2 border-gray-100 p-3 rounded-xl outline-none focus:border-blue-400">
            <input id="password" type="password" placeholder="Hasło (min. 6 znaków)" class="w-full border-2 border-gray-100 p-3 rounded-xl outline-none focus:border-blue-400">
            <div class="flex gap-3">
                <button onclick="signIn()" class="flex-1 bg-blue-600 text-white py-3 rounded-xl font-bold hover:bg-blue-700 shadow-lg transition-all">Zaloguj</button>
                <button onclick="signUp()" class="flex-1 border-2 border-blue-600 text-blue-600 py-3 rounded-xl font-bold hover:bg-blue-50 transition-all text-sm">Załóż konto</button>
            </div>
        </div>
    </div>

    <div id="add-panel" class="hidden bg-white p-8 rounded-3xl shadow-lg mb-8 border-t-8 border-blue-600">
        <h2 class="text-2xl font-black mb-6 text-gray-800 uppercase">Dodaj nowe ogłoszenie</h2>
        <div class="space-y-4">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <input id="t" placeholder="Tytuł (np. Układanie paneli)" class="border-2 border-gray-100 p-3 rounded-xl focus:border-blue-400 outline-none">
                <input id="m" placeholder="Miasto" class="border-2 border-gray-100 p-3 rounded-xl focus:border-blue-400 outline-none">
            </div>
            
            <select id="k" class="w-full border-2 border-gray-100 p-3 rounded-xl bg-gray-50 outline-none">
                <option value="Remont">Remont</option>
                <option value="Budowa">Budowa</option>
                <option value="Ogród">Ogród</option>
                <option value="Inne">Inne</option>
            </select>

            <textarea id="o" placeholder="Opis Twoich usług..." class="w-full border-2 border-gray-100 p-3 rounded-xl h-24 focus:border-blue-400 outline-none"></textarea>
            
            <div>
                <label class="text-[10px] font-black text-gray-400 uppercase ml-1">📱 Numer telefonu (tylko cyfry)</label>
                <input id="p" type="tel" inputmode="numeric" placeholder="Np. 500600700" 
                       class="w-full border-2 border-gray-100 p-3 rounded-xl focus:border-blue-400 outline-none">
            </div>
            
            <div>
                <label class="text-[10px] font-black text-gray-400 uppercase ml-1">📸 Zdjęcie Twojej pracy</label>
                <input id="img-input" type="file" accept="image/*" class="w-full border-2 border-dashed border-gray-200 p-4 rounded-xl text-sm text-gray-400 cursor-pointer hover:bg-gray-50 transition-colors">
            </div>

            <button onclick="add()" id="add-btn" class="w-full bg-blue-600 text-white py-4 rounded-2xl font-black text-xl shadow-xl hover:bg-blue-700 transition-all uppercase">Opublikuj zlecenie</button>
            <button onclick="signOut()" class="w-full mt-4 text-xs text-gray-400 font-bold underline">Wyloguj mnie</button>
        </div>
    </div>

    <div id="list" class="space-y-6 mt-8"></div>
</div>

<script>
const SUPABASE_URL = "https://uodwrtpaesemcizdhcht.supabase.co";
const SUPABASE_KEY = "sb_publishable_WVkoJLfkTfUD95EeSZMDQQ_VEhzlW6n";
const db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// LOGOWANIE I REJESTRACJA
async function signUp() {
    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;
    const { error } = await db.auth.signUp({ email, password });
    if (error) alert("Błąd: " + error.message);
    else alert("Konto utworzone! Możesz się teraz zalogować.");
}

async function signIn() {
    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;
    const { error } = await db.auth.signInWithPassword({ email, password });
    if (error) alert("Błąd logowania: " + error.message);
}

async function signOut() { await db.auth.signOut(); location.reload(); }

db.auth.onAuthStateChange((event, session) => {
    const authPanel = document.getElementById('auth-panel');
    const addPanel = document.getElementById('add-panel');
    const userInfo = document.getElementById('user-info');
    if (session) {
        authPanel.classList.add('hidden');
        addPanel.classList.remove('hidden');
        userInfo.innerText = `Zalogowany jako: ${session.user.email}`;
    } else {
        authPanel.classList.remove('hidden');
        addPanel.classList.add('hidden');
    }
});

// DODAWANIE OGŁOSZENIA
async function add() {
    const btn = document.getElementById('add-btn');
    const { data: { user } } = await db.auth.getUser();
    if (!user) return;

    // WALIDACJA TELEFONU
    let rawPhone = document.getElementById("p").value;
    let cleanPhone = rawPhone.replace(/\D/g, ''); // Zostawia tylko cyfry

    if (cleanPhone.length < 9) {
        alert("Wpisz poprawny numer telefonu (minimum 9 cyfr)!");
        return;
    }

    btn.innerText = "Trwa publikowanie... Czekaj...";
    btn.disabled = true;

    const fileInput = document.getElementById('img-input');
    const file = fileInput.files[0];
    let photoUrl = "";

    // WYSYŁANIE ZDJĘCIA
    if (file) {
        const fileName = `${Date.now()}_${file.name}`;
        const { data, error: uploadError } = await db.storage.from('zdjecia').upload(fileName, file);
        
        if (!uploadError) {
            const { data: urlData } = db.storage.from('zdjecia').getPublicUrl(fileName);
            photoUrl = urlData.publicUrl;
        } else {
            console.error("Błąd zdjęcia:", uploadError.message);
        }
    }

    // ZAPIS DO TABELI
    const { error } = await db.from("Zlecenia").insert([{
        Tytuł: document.getElementById("t").value,
        Miasto: document.getElementById("m").value,
        Opis: document.getElementById("o").value,
        Telefon: cleanPhone,
        Kategoria: document.getElementById("k").value,
        user_email: user.email,
        zdjecie_url: photoUrl
    }]);

    if (error) {
        alert("Błąd: " + error.message);
        btn.disabled = false;
        btn.innerText = "Opublikuj teraz";
    } else {
        location.reload();
    }
}

// WYŚWIETLANIE LISTY
async function load() {
    const { data } = await db.from("Zlecenia").select("*").order("id", { ascending: false });
    const el = document.getElementById("list");
    if (!data) return;

    el.innerHTML = data.map(z => {
        const d = z.created_at ? new Date(z.created_at).toLocaleString('pl-PL', {day:'2-digit', month:'2-digit', year:'numeric', hour:'2-digit', minute:'2-digit'}) : "Niedawno";
        return `
            <div class="bg-white rounded-3xl shadow-sm border-2 border-white overflow-hidden hover:shadow-xl transition-all mb-4">
                ${z.zdjecie_url ? `<img src="${z.zdjecie_url}" class="w-full h-64 object-cover shadow-inner bg-gray-50" onerror="this.style.display='none'">` : ''}
                <div class="p-6">
                    <div class="flex justify-between items-start mb-2">
                        <span class="text-[9px] font-black bg-blue-100 text-blue-600 px-3 py-1 rounded-full uppercase">${z.Kategoria || 'Inne'}</span>
                        <span class="text-[10px] font-bold text-gray-400">📅 ${d}</span>
                    </div>
                    <h3 class="text-2xl font-black text-gray-800 mb-1 leading-tight">${z.Tytuł || 'Bez tytułu'}</h3>
                    <div class="text-blue-600 font-bold text-sm mb-4 italic">📍 ${z.Miasto || 'Polska'}</div>
                    <p class="text-gray-600 text-sm leading-relaxed mb-6">"${z.Opis || ''}"</p>
                    ${z.Telefon ? `
                        <div class="pt-4 border-t border-gray-100 flex items-center justify-between">
                            <span class="text-[10px] font-bold text-gray-400 uppercase tracking-widest text-xs">Kontakt:</span>
                            <a href="tel:${z.Telefon}" class="bg-green-500 text-white px-6 py-3 rounded-2xl font-black text-sm hover:bg-green-600 transition-all shadow-md">📞 ${z.Telefon}</a>
                        </div>
                    ` : ''}
                </div>
            </div>
        `;
    }).join("");
}

load();
</script>
</body>
</html>
