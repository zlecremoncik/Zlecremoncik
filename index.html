<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZlećRemoncik - Fachowcy od ręki</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&display=swap" rel="stylesheet">

    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; }
        .card-shadow { box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05), 0 8px 10px -6px rgba(0, 0, 0, 0.05); }
    </style>
</head>

<body class="text-slate-900">

<!-- NAV -->
<nav class="bg-white/80 backdrop-blur-md sticky top-0 z-50 border-b border-slate-100">
    <div class="max-w-5xl mx-auto px-4 py-3 flex justify-between items-center">
        <div class="text-2xl font-extrabold tracking-tighter text-slate-800">
            Zleć<span class="text-blue-600">Remoncik</span>
        </div>
        <div id="user-info" class="text-[10px] font-bold text-slate-400 bg-slate-50 px-3 py-1 rounded-full uppercase tracking-wider"></div>
    </div>
</nav>

<!-- HEADER ZE ZDJĘCIEM -->
<header class="pt-16 pb-24 px-4 text-center text-white relative overflow-hidden">

    <!-- TŁO -->
    <div class="absolute inset-0">
        <img src="kuchnia.png" class="w-full h-full object-cover">
        <div class="absolute inset-0 bg-black/50"></div>
    </div>

    <!-- TEKST -->
    <div class="relative z-10">
        <h1 class="text-4xl md:text-5xl font-extrabold mb-4 tracking-tight">
            Znajdź fachowca, <br>który zna się na rzeczy
        </h1>
        <p class="text-blue-100 text-lg opacity-90 max-w-xl mx-auto">
            Szybko, lokalnie i bez zbędnych formalności. Dodaj ogłoszenie w minutę.
        </p>
    </div>

</header>

<div class="max-w-3xl mx-auto px-4 -mt-12">

    <!-- LOGOWANIE -->
    <div id="auth-panel" class="bg-white p-8 rounded-3xl card-shadow mb-12 border border-slate-100">
        <h2 class="text-xl font-bold mb-6 text-slate-800">Zaloguj się, aby dodawać ogłoszenia</h2>

        <div class="space-y-4">
            <input id="email" type="email" placeholder="E-mail" class="w-full bg-slate-50 p-4 rounded-2xl">
            <input id="password" type="password" placeholder="Hasło" class="w-full bg-slate-50 p-4 rounded-2xl">

            <div class="grid grid-cols-2 gap-4">
                <button onclick="signIn()" class="bg-blue-600 text-white py-4 rounded-2xl font-bold">Zaloguj</button>
                <button onclick="signUp()" class="bg-white border py-4 rounded-2xl font-bold">Rejestracja</button>
            </div>
        </div>
    </div>

    <!-- DODAWANIE -->
    <div id="add-panel" class="hidden bg-white p-8 rounded-3xl card-shadow mb-12">

        <div class="flex justify-between mb-6">
            <h2 class="text-xl font-bold">Nowe ogłoszenie</h2>
            <button onclick="signOut()">Wyloguj</button>
        </div>

        <div class="space-y-4">
            <input id="t" placeholder="Tytuł" class="w-full bg-slate-50 p-3 rounded-xl">
            <input id="m" placeholder="Miasto" class="w-full bg-slate-50 p-3 rounded-xl">

            <textarea id="o" placeholder="Opis" class="w-full bg-slate-50 p-3 rounded-xl"></textarea>

            <input id="p" placeholder="Telefon" class="w-full bg-slate-50 p-3 rounded-xl">

            <input id="img-input" type="file">

            <button onclick="add()" id="add-btn" class="w-full bg-black text-white py-4 rounded-xl">
                Dodaj ogłoszenie
            </button>
        </div>
    </div>

    <!-- LISTA -->
    <div id="list" class="space-y-6"></div>

</div>

<script>
const SUPABASE_URL = "https://uodwrtpaesemcizdhcht.supabase.co";
const SUPABASE_KEY = "sb_publishable_WVkoJLfkTfUD95EeSZMDQQ_VEhzlW6n";
const db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// AUTH
async function signUp() {
    const { error } = await db.auth.signUp({
        email: email.value,
        password: password.value
    });
    if (!error) alert("Konto utworzone");
}

async function signIn() {
    const { error } = await db.auth.signInWithPassword({
        email: email.value,
        password: password.value
    });
    if (error) alert("Błąd logowania");
}

async function signOut() {
    await db.auth.signOut();
    location.reload();
}

db.auth.onAuthStateChange((e, session) => {
    auth-panel.classList.toggle("hidden", !!session);
    add-panel.classList.toggle("hidden", !session);
});

// DODAWANIE
async function add() {
    const { data: { user } } = await db.auth.getUser();
    if (!user) return;

    let file = document.getElementById("img-input").files[0];
    let url = "";

    if (file) {
        let name = Date.now() + file.name;
        await db.storage.from("zdjecia").upload(name, file);
        url = db.storage.from("zdjecia").getPublicUrl(name).data.publicUrl;
    }

    await db.from("Zlecenia").insert([{
        Tytuł: t.value,
        Miasto: m.value,
        Opis: o.value,
        Telefon: p.value,
        zdjecie_url: url
    }]);

    location.reload();
}

// LISTA
async function load() {
    const { data } = await db.from("Zlecenia").select("*").order("id", { ascending: false });

    list.innerHTML = data.map(z => `
        <div class="bg-white p-4 rounded-2xl shadow">
            ${z.zdjecie_url ? `<img src="${z.zdjecie_url}" class="w-full h-48 object-cover rounded-xl mb-3">` : ""}
            <h3 class="font-bold text-lg">${z.Tytuł}</h3>
            <p>${z.Opis}</p>
            <a href="tel:${z.Telefon}" class="text-green-600 font-bold">${z.Telefon}</a>
        </div>
    `).join("");
}

load();
</script>

</body>
</html>
